name: Landsail Automation Engine

on:
  schedule:
    # Runs exactly once a day at 07:00 AM UTC (8:00 AM West European Summer Time)
    - cron: '0 7 * * *'
  workflow_dispatch: # Keeps the manual play button active in GitHub

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Runtime Library Dependencies
        run: npm install axios

      - name: Execute Live Condition Scans
        run: node cron-check.js
