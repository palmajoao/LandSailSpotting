<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landsail Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="/LandSailSpotting/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<script>
    if ('serviceWorker' in navigator) {
      // Adding the repo name to the path ensures it registers correctly on GitHub Pages
      navigator.serviceWorker.register('/LandSailSpotting/sw.js')
        .then(() => console.log("PWA Registered"))
        .catch(err => console.log("PWA Failed", err));
    }
  </script>
    <style>
        #map { height: 500px; width: 100%; border-radius: 8px; z-index: 1; }
        .spot-card { transition: transform 0.2s; cursor: pointer; border-radius: 8px; }
        .leaflet-popup-content { margin: 12px; line-height: 1.2; }
        .alert-toggle { font-size: 1.2rem; cursor: pointer; transition: opacity 0.2s; }
        .alert-toggle:hover { opacity: 0.7; }
        .active-alert-card { background-color: #f8f9ff; border-right: 4px solid #0d6efd !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm mb-3">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🌬️ LANDSAIL DASHBOARD</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-lg-4 mb-4">
            <div id="spot-list" class="list-group shadow-sm">
                <div class="text-center py-5 bg-white border rounded" id="loader">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Scanning Atlantic Windows...</p>
                </div>
            </div>
        </div>
        
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-3">
                <div id="map"></div>
            </div>

            <div id="alert-manager" class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">🔔 Notification Center</h6>
                    <div id="status-badge" class="badge bg-secondary">Checking...</div>
                </div>
                <div class="card-body">
                    <div id="setup-view">
                        <button id="btn-enable-alerts" class="btn btn-primary w-100 fw-bold">ENABLE BROWSER ALERTS</button>
                    </div>
                    <div id="active-view" style="display: none;">
                        <div class="small text-success mb-2">✅ Notifications Enabled. Use the 🔔 icon on spots to subscribe.</div>
                        <button id="btn-test-alert" class="btn btn-outline-secondary btn-sm">Send Test Alert</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
